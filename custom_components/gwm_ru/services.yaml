flash_lights:
  name: "Моргнуть фарами"
  description: "Включить аварийную сигнализацию на 3 секунды"
  fields:
    security_pin:
      name: "PIN-код безопасности"
      description: "PIN-код безопасности, установленный в официальном приложении GWM. Если PIN сохранён в настройках интеграции, это поле можно не заполнять."
