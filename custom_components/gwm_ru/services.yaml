rear_defrost_on:
  name: "Включить обогрев заднего стекла"
  description: "Включить обогрев заднего стекла с таймером работы"
  fields:
    operation_time:
      name: "Время работы (минуты)"
      description: "Время работы обогрева в минутах (по умолчанию 10)"
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          mode: box
          unit_of_measurement: "мин"
    security_pin:
      name: "PIN-код безопасности"
      description: "PIN-код безопасности, установленный в официальном приложении GWM. Если PIN сохранён в настройках интеграции, это поле можно не заполнять."
